# Multi-vehicle logic sim / evaluation: do not keep a long "tail" of allocated points
# behind the vehicle (LENGTH_RESPECTED). That tail left Point-C allocated to the vehicle
# at D and blocked the other car's B->C leg, while the first car still held B — deadlock.
kernelapp.vehicleResourceManagementType = LENGTH_IGNORED
